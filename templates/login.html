<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Login - Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .interactive-bg {
            background: linear-gradient(135deg, #1a2a6c, #112b3c, #203a43);
            position: relative;
            height: 100vh;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }

        .form-floating > .form-control:focus ~ label {
            color: #1a2a6c;
            font-weight: bold;
        }
        
        .form-control:focus {
            border-color: #1a2a6c;
            box-shadow: 0 0 0 0.25rem rgba(26, 42, 108, 0.25);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }

        .btn-interactive {
            background: linear-gradient(45deg, #1a2a6c, #2a4858);
            border: none;
            transition: all 0.3s ease;
        }
        
        .btn-interactive:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(26, 42, 108, 0.4);
        }
    </style>
</head>
<body>
    <div class="row g-0 vh-100">
        
        <div class="col-md-7 d-none d-md-block interactive-bg">
            <canvas id="particleCanvas"></canvas>
            <div class="bg-text-overlay">
                <i class="fas fa-boxes fa-4x mb-3 text-info"></i>
                <h1 class="display-4 fw-bold">Smart Inventory</h1>
                <p class="lead text-light">Next-Generation Enterprise Management</p>
            </div>
        </div>
        
        <div class="col-md-5 d-flex align-items-center justify-content-center bg-light">
            <div class="card login-card p-5" style="width: 85%; max-width: 480px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to access the portal</p>
                </div>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category if category != 'message' else 'danger' }} shadow-sm rounded-3">
                          <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="/" method="POST" id="loginForm">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control rounded-3" id="emailInput" name="email" placeholder="name@example.com" required value="admin@system.com">
                        <label for="emailInput"><i class="fas fa-envelope me-2"></i>Email address</label>
                    </div>
                    
                    <div class="form-floating mb-4 position-relative">
                        <input type="password" class="form-control rounded-3" id="passwordInput" name="password" placeholder="Password" required value="admin123">
                        <label for="passwordInput"><i class="fas fa-lock me-2"></i>Password</label>
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePass()"></i>
                    </div>

                    <button type="submit" class="btn btn-interactive btn-lg w-100 fw-bold text-white rounded-3" id="loginBtn">
                        Secure Login <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('passwordInput');
            const icon = document.getElementById('togglePassword');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Authenticating...';
            btn.classList.add('disabled');
        });

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = document.querySelector('.interactive-bg').offsetWidth;
            height = canvas.height = document.querySelector('.interactive-bg').offsetHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                // Bounce off edges
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 212, 255, 0.5)';
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 212, 255, ${1 - distance/120})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>
</html>
